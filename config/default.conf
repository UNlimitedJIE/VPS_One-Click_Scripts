# Debian 12 VPS 初始化与维护默认配置
# 修改本文件后再执行 bootstrap.sh

# 时区。示例：Asia/Shanghai、America/New_York
TIMEZONE="UTC"

# SSH 监听端口。默认 22。
# 如果改成非 22，请同时确认云厂商安全组/外部防火墙已放行。
SSH_PORT="22"

# 当 SSH_PORT 不等于 22 时，必须显式确认后才会真正切换 SSH 端口并同步 nftables。
# false：只提示，不实际切换到新端口
# true：确认外部放行已完成，允许真正切换
CONFIRM_SSH_PORT_CHANGE="false"

# 管理用户。建议手动改成你自己的管理用户名。
ADMIN_USER="ops"

# 管理用户 shell。Debian 12 常见值：/bin/bash
ADMIN_USER_SHELL="/bin/bash"

# 管理用户补充组，逗号分隔。通常至少包含 sudo。
ADMIN_USER_GROUPS="sudo"

# 管理用户 sudo 模式默认值（非交互或 plan/dry-run 时使用）。
# 仅允许：nopasswd / password
# nopasswd: 免密 sudo（默认）
# password: sudo 需要输入密码
# 注意：这只影响 sudo 行为，不会影响 SSH 是否允许密码登录。
ADMIN_SUDO_MODE_DEFAULT="nopasswd"

# SSH 公钥导入源文件路径。
# 默认固定为 /opt/vps-bootstrap/bootstrap_authorized_keys
# 若该文件不存在或没有有效公钥，第 4 步会提示你直接粘贴一整行公钥并写入这里。
AUTHORIZED_KEYS_FILE="/opt/vps-bootstrap/bootstrap_authorized_keys"

# 仅在“安全门”通过后才会真正生效：
# - 已创建管理用户
# - 已写入 authorized_keys
# - 至少检测到一个有效公钥
DISABLE_PASSWORD_LOGIN="true"

# 是否禁止 root 使用密码 SSH 登录。
# true 时会写为 PermitRootLogin prohibit-password
DISABLE_ROOT_SSH_PASSWORD="true"

# 是否安装 Fail2Ban
INSTALL_FAIL2BAN="true"

# 是否安装 unattended-upgrades
INSTALL_UNATTENDED_UPGRADES="true"

# 第 10 步 swap 现在始终通过交互显式选择：
# - skip
# - 1G
# - 2G
# - 4G
# - custom
# 不再根据内存自动决定，也不再使用预设 swap 大小。

# 是否执行固定的 NodeQuality 基线脚本
ENABLE_NODEQUALITY="true"

# 如需重复执行 NodeQuality，可手动设为 true
NODEQUALITY_FORCE="false"

# 是否启用 nftables
ENABLE_NFTABLES="true"

# 是否启用时区和时间同步配置
ENABLE_TIME_SYNC="true"

# 是否仅做计划预览。通常由 bootstrap.sh plan 自动设置。
PLAN_ONLY="false"

# 是否仅做 dry-run。通常由 --dry-run 或 plan 模式自动设置。
DRY_RUN="false"

# 模块注册表。一般无需修改。
MODULE_REGISTRY_FILE=""

# 基础工具包。可按需增删。
BASE_PACKAGES="curl ca-certificates sudo openssh-server nftables rsync unzip git jq lsof procps htop vim-tiny less"

# 日志清理保留天数。0 表示不清理 journal。
JOURNAL_VACUUM_DAYS="14"

# 维护清理时是否执行 apt clean
CLEANUP_APT_CACHE="true"

# 谨慎 sysctl 调优入口：
# - none: 默认不改
# - baseline: 显式启用保守型网络硬化
SAFE_TUNING_PROFILE="none"

# 运行状态目录与日志目录，一般无需修改
STATE_DIR=""
LOG_DIR=""

# 变更记录文件，一般无需修改
CHANGE_LOG_FILE=""

# 初始化完成后的手动提醒
SNAPSHOT_REMINDER="初始化通过后，请先验证新 SSH 登录，再在云厂商控制台创建快照/备份。"
